<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Recipe Editor — your kitchen notebook</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,700;1,9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="hero">
    <div class="hero-bg" aria-hidden="true"></div>
    <div class="hero-inner">
      <div class="hero-eyebrow">
        <span class="hero-dot"></span>
        Kitchen notebook
      </div>
      <h1 class="hero-title">Recipe Editor</h1>
      <p class="hero-sub">Upload the recipes you love. Riff on them. Keep every version.</p>
      <div class="hero-actions">
        <label class="btn primary btn-lg">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor" aria-hidden="true"><path d="M12 3l4 4h-3v6h-2V7H8l4-4zM5 19h14v2H5v-2z"/></svg>
          Upload recipe
          <input id="upload-input" type="file" accept=".pdf,.docx,image/*" hidden />
        </label>
        <button id="new-manual" class="btn ghost btn-lg">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor" aria-hidden="true"><path d="M11 11V5h2v6h6v2h-6v6h-2v-6H5v-2h6z"/></svg>
          New blank recipe
        </button>
      </div>
      <span id="status" class="status muted"></span>
    </div>
  </header>

  <!-- 1. Recipe navigator table -->
  <section class="nav-section">
    <div class="nav-header">
      <div>
        <h2 class="section-title">Your recipes</h2>
        <p class="section-sub muted" id="recipe-count">—</p>
      </div>
      <input id="search" class="search" type="search" placeholder="Search your collection..." />
    </div>
    <div class="table-wrap">
      <table id="recipe-table">
        <thead>
          <tr>
            <th style="width: 68px;"></th>
            <th>Title</th>
            <th>Type</th>
            <th>Variants</th>
            <th>Source</th>
            <th>Created</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="recipe-tbody">
          <tr><td colspan="7" class="muted">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </section>

  <!-- 2. Workbench: original on the left, variant editor on the right -->
  <section id="workbench" class="workbench hidden">
    <div class="workbench-header">
      <h2 id="workbench-title">Working on: <span id="wb-recipe-title">—</span></h2>
      <div class="workbench-tabs">
        <button class="tab active" data-view="edit">Create variant</button>
        <button class="tab" data-view="compare">Compare side-by-side</button>
      </div>
    </div>

    <!-- EDIT VIEW: original | variant editor -->
    <div class="panes" data-view="edit">
      <div class="pane">
        <div class="pane-label">
          <span>Original</span>
          <div class="view-toggle" id="original-toggle">
            <button class="toggle-btn active" data-mode="file">Upload</button>
            <button class="toggle-btn" data-mode="parsed">Parsed</button>
          </div>
        </div>
        <div id="original-file-view" class="original-file-view"></div>
        <div id="original-view" class="recipe-card readonly hidden"></div>
      </div>
      <div class="pane">
        <div class="pane-label">Variant (editable)</div>

        <div class="variant-toolbar">
          <input id="variant-label" class="variant-label-input" type="text" placeholder="Variant label (e.g. 'Vegan version')" />
          <div class="ai-row">
            <input id="ai-instructions" type="text" placeholder="AI: e.g. 'make it vegan', 'halve quantities', 'use air fryer'" />
            <button id="ai-generate" class="btn primary">Generate with AI</button>
          </div>
        </div>

        <div id="variant-editor" class="recipe-card editable"></div>

        <div class="save-row">
          <button id="reset-variant" class="btn">Reset to original</button>
          <button id="save-variant" class="btn primary">Save variant</button>
        </div>
      </div>
    </div>

    <!-- COMPARE VIEW -->
    <div class="panes hidden" data-view="compare">
      <div class="pane">
        <div class="pane-label">
          <span>Original</span>
          <div class="view-toggle" id="compare-original-toggle">
            <button class="toggle-btn active" data-mode="file">Upload</button>
            <button class="toggle-btn" data-mode="parsed">Parsed</button>
          </div>
        </div>
        <div id="compare-original-file-view" class="original-file-view"></div>
        <div id="compare-left" class="recipe-card readonly hidden"></div>
      </div>
      <div class="pane">
        <div class="pane-label">
          <span>Variant</span>
          <select id="compare-pick" class="compare-pick"></select>
        </div>
        <div id="compare-right" class="recipe-card readonly"></div>
      </div>
    </div>
  </section>

  <!-- Upload-parse confirmation modal -->
  <div id="upload-modal" class="modal hidden">
    <div class="modal-card">
      <h3>Parsed recipe</h3>
      <p class="muted">Review and edit before saving.</p>
      <div id="upload-editor" class="recipe-card editable"></div>
      <div class="save-row">
        <button id="upload-cancel" class="btn">Cancel</button>
        <button id="upload-save" class="btn primary">Save recipe</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="/app.js"></script>
</body>
</html>
